{% extends "base.html" %}

{% block title %}Chat - Burme AI{% endblock %}

{% block extra_head %}
<style>
.chat-container {
    height: calc(100vh - 180px);
    max-height: calc(100vh - 180px);
    display: flex;
    flex-direction: column;
}

.chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    background: var(--card-bg);
    border-radius: 12px;
    margin-bottom: 1rem;
}

.chat-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    background: var(--card-bg);
    border-radius: 12px;
    margin-bottom: 1rem;
}

.chat-message {
    display: flex;
    margin-bottom: 1rem;
    animation: fadeIn 0.3s ease;
}

.chat-message.user {
    justify-content: flex-end;
}

.chat-message.ai {
    justify-content: flex-start;
}

.message-bubble {
    max-width: 80%;
    padding: 0.875rem 1rem;
    border-radius: 12px;
    word-wrap: break-word;
}

.chat-message.user .message-bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    color: white;
    border-bottom-right-radius: 4px;
}

.chat-message.ai .message-bubble {
    background: var(--input-bg);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
}

.message-bubble p {
    margin: 0;
}

.message-bubble p + p {
    margin-top: 0.5rem;
}

.message-bubble code {
    background: rgba(0, 0, 0, 0.3);
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    font-size: 0.875em;
}

.message-bubble pre {
    background: rgba(0, 0, 0, 0.3);
    padding: 0.75rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.5rem 0;
}

.message-bubble pre code {
    background: transparent;
    padding: 0;
}

.chat-input-container {
    display: flex;
    gap: 0.75rem;
    padding: 1rem;
    background: var(--card-bg);
    border-radius: 12px;
}

.chat-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    padding: 0.875rem 1rem;
    border-radius: 8px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
}

.chat-input:focus {
    outline: none;
    border-color: var(--accent);
}

.btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
    border: none;
    color: white;
    width: 48px;
    height: 48px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.btn-send:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 16px rgba(233, 69, 96, 0.3);
}

.btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 0.875rem 1rem;
    background: var(--input-bg);
    border-radius: 12px;
}

.typing-indicator span {
    width: 8px;
    height: 8px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes typing {
    0%, 60%, 100% {
        transform: translateY(0);
    }
    30% {
        transform: translateY(-8px);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.chat-empty {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary);
}

.chat-empty i {
    font-size: 3rem;
    margin-bottom: 1rem;
    color: var(--accent);
}
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div class="chat-title">
            <i class="fa-solid fa-comments text-accent me-2"></i>
            AI Chat
        </div>
        <button class="btn btn-sm btn-outline-light three-d-btn" onclick="clearChat()">
            <i class="fa-solid fa-trash me-1"></i>
            Clear
        </button>
    </div>
    
    <div class="chat-messages" id="chat-messages">
        <div class="chat-empty" id="chat-empty">
            <i class="fa-solid fa-robot"></i>
            <h4>Start a conversation</h4>
            <p>Send a message to begin chatting with AI</p>
        </div>
    </div>
    
    <div class="chat-input-container">
        <textarea class="chat-input" id="chat-input" placeholder="Type your message..." rows="1"></textarea>
        <button class="btn btn-send three-d-btn" id="send-btn" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let chatHistory = [];
const chatEmpty = document.getElementById('chat-empty');
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function clearChat() {
    chatHistory = [];
    renderMessages();
}

function renderMessages() {
    if (chatHistory.length === 0) {
        chatEmpty.style.display = 'block';
        chatMessages.innerHTML = '';
        chatMessages.appendChild(chatEmpty);
        return;
    }
    
    chatEmpty.style.display = 'none';
    chatMessages.innerHTML = chatHistory.map(msg => `
        <div class="chat-message ${msg.role}">
            <div class="message-bubble">
                ${formatMessage(msg.content)}
            </div>
        </div>
    `).join('');
    
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function formatMessage(content) {
    // Simple markdown-like formatting
    return content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
}

async function sendMessage() {
    const message = chatInput.value.trim();
    if (!message) return;
    
    // Add user message
    chatHistory.push({ role: 'user', content: message });
    chatInput.value = '';
    renderMessages();
    
    // Show typing indicator
    sendBtn.disabled = true;
    const typingDiv = document.createElement('div');
    typingDiv.className = 'chat-message ai';
    typingDiv.id = 'typing-indicator';
    typingDiv.innerHTML = `
        <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    `;
    chatMessages.appendChild(typingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: message,
                history: chatHistory.slice(0, -1)
            })
        });
        
        const result = await response.json();
        
        // Remove typing indicator
        document.getElementById('typing-indicator').remove();
        
        if (result.success) {
            chatHistory.push({ role: 'ai', content: result.response });
        } else {
            chatHistory.push({ role: 'ai', content: 'Error: ' + (result.error || 'Failed to get response') });
        }
    } catch (error) {
        document.getElementById('typing-indicator').remove();
        chatHistory.push({ role: 'ai', content: 'Error: Network failed' });
    }
    
    sendBtn.disabled = false;
    renderMessages();
}

// Handle Enter key
chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// Auto-resize textarea
chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
{% endblock %}
